<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0f0f0f">
  <title>Power House</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <header class="app-header">
    <div class="header-content">
      <h1>Power House</h1>
      <p class="subtitle">Denmark</p>
    </div>
  </header>

  <main id="app-content"></main>

  <nav class="tab-bar">
    <button class="tab-btn active" data-tab="home">
      <span class="tab-label">Home</span>
    </button>
    <button class="tab-btn" data-tab="workout">
      <span class="tab-label">Workout</span>
    </button>
    <button class="tab-btn" data-tab="progress">
      <span class="tab-label">Progress</span>
    </button>
    <button class="tab-btn" data-tab="equipment">
      <span class="tab-label">Equipment</span>
    </button>
  </nav>

  <script src="data.js"></script>
  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>
</body>
</html>
